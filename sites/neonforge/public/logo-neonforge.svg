<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="ng-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF2EC4"/>
    </linearGradient>
    <filter id="ng-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hex icon -->
  <g transform="translate(8, 14)" filter="url(#ng-glow)">
    <polygon points="26,2 50,16 50,40 26,54 2,40 2,16"
             fill="none" stroke="url(#ng-grad)" stroke-width="3"/>
    <polygon points="26,14 38,21 38,35 26,42 14,35 14,21"
             fill="url(#ng-grad)" opacity="0.85"/>
    <line x1="2"  y1="28" x2="14" y2="28" stroke="#00F0FF" stroke-width="2"/>
    <line x1="38" y1="28" x2="50" y2="28" stroke="#FF2EC4" stroke-width="2"/>
  </g>
  <!-- Wordmark -->
  <g font-family="Orbitron, 'Rajdhani', sans-serif" filter="url(#ng-glow)">
    <text x="78" y="38" font-size="26" font-weight="800" fill="url(#ng-grad)" letter-spacing="2">NEON</text>
    <text x="78" y="62" font-size="18" font-weight="600" fill="#FFFFFF" letter-spacing="6" opacity="0.85">FORGE</text>
  </g>
  <!-- Accent line -->
  <line x1="78" y1="44" x2="220" y2="44" stroke="url(#ng-grad)" stroke-width="1" opacity="0.4"/>
</svg>
