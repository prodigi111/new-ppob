<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 70" role="img" aria-label="EliteCharge logo">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="white"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="brandGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Thematic graphic mark -->
  <g filter="url(#brandGlow)">
            <!-- Minimal three-spike crown with center jewel -->
            <g transform="translate(8,12)">
              <path d="M2 36 L6 14 L16 26 L24 6 L32 26 L42 14 L46 36 Z"
                    fill="url(#brandGrad)" stroke="rgba(255,255,255,0.85)" stroke-width="1.6"/>
              <rect x="2" y="38" width="44" height="4" fill="#B8860B" stroke="rgba(255,255,255,0.6)" stroke-width="0.8"/>
              <circle cx="24" cy="22" r="3.5" fill="white" stroke="#B8860B" stroke-width="1.2"/>
            </g></g>
  <!-- Brand-name wordmark -->
  <text x="78" y="44"
        font-family="'Playfair Display', 'Cormorant Garamond', serif"
        font-weight="800"
        font-size="22"
        fill="url(#textGrad)"
        style="letter-spacing:1.5px">ELITECHARGE</text>
</svg>
