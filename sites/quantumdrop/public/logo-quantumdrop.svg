<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 70" role="img" aria-label="QuantumDrop logo">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#10B981"/>
      <stop offset="100%" stop-color="#84CC16"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#10B981"/>
      <stop offset="60%" stop-color="white"/>
      <stop offset="100%" stop-color="#84CC16"/>
    </linearGradient>
    <filter id="brandGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Thematic graphic mark -->
  <g filter="url(#brandGlow)">
            <!-- Terminal prompt: angle bracket + cursor + code stream -->
            <g transform="translate(8,8)">
              <!-- Frame -->
              <rect x="2" y="6" width="44" height="36" rx="3" fill="rgba(0,0,0,0.85)"
                    stroke="url(#brandGrad)" stroke-width="2"/>
              <!-- Window dots -->
              <circle cx="7" cy="11" r="1.2" fill="#84CC16" opacity="0.8"/>
              <circle cx="11" cy="11" r="1.2" fill="#84CC16" opacity="0.55"/>
              <circle cx="15" cy="11" r="1.2" fill="#84CC16" opacity="0.35"/>
              <!-- Prompt: > -->
              <path d="M7 22 L13 26 L7 30" fill="none" stroke="url(#brandGrad)"
                    stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
              <!-- Code lines -->
              <rect x="17" y="20" width="20" height="2" fill="#10B981" opacity="0.9"/>
              <rect x="17" y="25" width="14" height="2" fill="#84CC16" opacity="0.85"/>
              <rect x="17" y="30" width="18" height="2" fill="#10B981" opacity="0.8"/>
              <!-- Blinking cursor block -->
              <rect x="38" y="29" width="4" height="4" fill="#84CC16"/>
            </g></g>
  <!-- Brand-name wordmark -->
  <text x="78" y="44"
        font-family="'JetBrains Mono', 'IBM Plex Mono', 'Fira Code', monospace"
        font-weight="800"
        font-size="22"
        fill="url(#textGrad)"
        style="letter-spacing:1.5px">QUANTUMDROP</text>
</svg>
