<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 275 70" role="img" aria-label="PixelVault logo">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFD60A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FF7A00"/>
      <stop offset="60%" stop-color="white"/>
      <stop offset="100%" stop-color="#FFD60A"/>
    </linearGradient>
    <filter id="brandGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Thematic graphic mark -->
  <g filter="url(#brandGlow)">
            <!-- 3D stacked pixel blocks -->
            <g transform="translate(8,8)">
              <rect x="4"  y="32" width="14" height="14" fill="#FF7A00" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
              <rect x="18" y="32" width="14" height="14" fill="#FFD60A" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
              <rect x="32" y="32" width="14" height="14" fill="#FF7A00" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
              <rect x="11" y="18" width="14" height="14" fill="#FFD60A" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
              <rect x="25" y="18" width="14" height="14" fill="#FF7A00" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
              <rect x="18" y="4"  width="14" height="14" fill="url(#brandGrad)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
            </g></g>
  <!-- Brand-name wordmark -->
  <text x="78" y="44"
        font-family="'Press Start 2P', 'VT323', monospace"
        font-weight="800"
        font-size="22"
        fill="url(#textGrad)"
        style="letter-spacing:1.5px">PIXELVAULT</text>
</svg>
