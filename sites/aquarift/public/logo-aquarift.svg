<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 263 70" role="img" aria-label="AquaRift logo">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00C9A7"/>
      <stop offset="60%" stop-color="white"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="brandGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Thematic graphic mark -->
  <g filter="url(#brandGlow)">
            <!-- Tactical radar reticle: outer ring, crosshair lines, range marks -->
            <g transform="translate(8,8)">
              <circle cx="24" cy="24" r="22" fill="none" stroke="url(#brandGrad)" stroke-width="2.4"/>
              <circle cx="24" cy="24" r="13" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.85"/>
              <line x1="24" y1="0"  x2="24" y2="8"  stroke="#FF6B6B" stroke-width="2.4"/>
              <line x1="24" y1="40" x2="24" y2="48" stroke="#FF6B6B" stroke-width="2.4"/>
              <line x1="0"  y1="24" x2="8"  y2="24" stroke="#FF6B6B" stroke-width="2.4"/>
              <line x1="40" y1="24" x2="48" y2="24" stroke="#FF6B6B" stroke-width="2.4"/>
              <circle cx="24" cy="24" r="3.5" fill="white"/>
            </g></g>
  <!-- Brand-name wordmark -->
  <text x="78" y="44"
        font-family="'Audiowide', 'Exo 2', 'Rajdhani', sans-serif"
        font-weight="800"
        font-size="26"
        fill="url(#textGrad)"
        style="letter-spacing:1.5px">AQUARIFT</text>
</svg>
